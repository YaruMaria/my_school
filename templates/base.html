<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📓 Тетрадь учителя</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #e8e0d5;
            padding: 25px;
            margin: 0;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }
        h1 { color: #4a3f35; border-bottom: 3px solid #d4c9b8; padding-bottom: 15px; }
        .flash-messages {
            padding: 15px 22px;
            margin: 10px 0 25px 0;
            border-radius: 12px;
            background: #eaf3ed;
            color: #2d5a40;
            border-left: 6px solid #5d7b6f;
            font-size: 17px;
        }
        .flash-messages p { margin: 8px 0; }

        .btn {
            background: #5d7b6f;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 5px 0;
            font-size: 16px;
            font-weight: bold;
        }
        .btn:hover {
            background: #4a6559;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(93, 123, 111, 0.3);
        }
        .btn-secondary { background: #b0a28a; }
        .btn-secondary:hover {
            background: #9a8c74;
            box-shadow: 0 4px 15px rgba(176, 162, 138, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                border-radius: 12px;
            }
            body { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for msg in messages %}
                        <p style="margin: 5px 0;">{{ msg }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
